{% macro cjsLineAreaChart() %}
<div class="card h-100">
    <div class="card-header d-flex align-items-center justify-content-between">
      <h5 class="card-title mb-0">Data Science</h5>
      <div class="dropdown">
        <button
          class="btn p-0"
          type="button"
          id="cjsAreaDropdown"
          data-bs-toggle="dropdown"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <i class="bx bx-calendar"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-end" aria-labelledby="cjsAreaDropdown">
          <a class="dropdown-item" href="javascript:void(0);">Today</a>
          <a class="dropdown-item" href="javascript:void(0);">Yesterday</a>
          <a class="dropdown-item" href="javascript:void(0);">Last 7 Days</a>
          <a class="dropdown-item" href="javascript:void(0);">Last 30 Days</a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item" href="javascript:void(0);">Current Month</a>
          <a class="dropdown-item" href="javascript:void(0);">Last Month</a>
        </div>
      </div>
    </div>
    <div class="card-body pt-2">
      <canvas id="cjsLineAreaChart" data-height="450"></canvas>
    </div>
  </div>
{% endmacro %}
