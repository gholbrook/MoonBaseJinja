{% macro cjsScatterChart() %}
<div class="card h-100">
    <div class="card-header d-flex flex-nowrap align-items-center justify-content-between">
      <h5 class="card-title mb-0">New Product Data</h5>
      <div class="d-none d-sm-block btn-group" role="group">
        <input type="radio" class="btn-check" name="cjsScatterRadio" id="cjsScatterDaily" checked />
        <label class="btn btn-outline-secondary btn-sm" for="cjsScatterDaily">Daily</label>
        <input type="radio" class="btn-check" name="cjsScatterRadio" id="cjsScatterMonthly" />
        <label class="btn btn-outline-secondary btn-sm" for="cjsScatterMonthly">Monthly</label>
        <input type="radio" class="btn-check" name="cjsScatterRadio" id="cjsScatterYearly" />
        <label class="btn btn-outline-secondary btn-sm" for="cjsScatterYearly">Yearly</label>
      </div>
    </div>
    <div class="card-body pt-2">
      <canvas id="cjsScatterChart" data-height="435"></canvas>
    </div>
  </div>
{% endmacro %}
